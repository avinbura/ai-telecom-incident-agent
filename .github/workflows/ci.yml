name: Telecom AI Agent CI/CD Pipeline

on:
  push:
    branches:
      - main
      - version-12

  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate FastAPI Imports
        run: |
          python -c "from app.main import app; print('FastAPI import successful')"

      - name: Build Docker Image
        run: |
          docker build -t telecom-ai-agent .

  deploy-to-azure:
    needs: build-and-test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to Azure Container Registry
        run: |
          az acr login --name telecomaiacr4383

      - name: Build and Push Docker Image
        run: |
          docker build -t telecomaiacr4383.azurecr.io/telecom-ai-agent:latest .
          docker push telecomaiacr4383.azurecr.io/telecom-ai-agent:latest

      - name: Configure Azure Web App Container
        run: |
          az webapp config container set \
            --name telecom-ai-agent-4383 \
            --resource-group telecom-ai-rg \
            --docker-custom-image-name telecomaiacr4383.azurecr.io/telecom-ai-agent:latest \
            --docker-registry-server-url https://telecomaiacr4383.azurecr.io

      - name: Restart Azure Web App
        run: |
          az webapp restart \
            --name telecom-ai-agent-4383 \
            --resource-group telecom-ai-rg