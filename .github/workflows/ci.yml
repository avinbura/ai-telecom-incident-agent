name: Telecom AI Agent CI Pipeline

on:
  push:
    branches:
      - main
      - version-11

  pull_request:
    branches:
      - main

jobs:

  build-and-test:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate FastAPI Imports
        run: |
          python -c "from app.main import app; print('FastAPI import successful')"

      - name: Build Docker Image
        run: |
          docker build -t telecom-ai-agent .

      - name: CI Pipeline Completed
        run: |
          echo "CI pipeline completed successfully"


  deploy-to-azure:

    needs: build-and-test

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: telecom-ai-agent-4383
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}

          