version: '3.9'

services:

  telecom-ai-agent:
    build: .
    container_name: telecom-ai-agent
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - redis
      - zookeeper
      - kafka
  
 # telecom-consumer:
  #  build: .
   # container_name: telecom-consumer
    # command: python -u app/kafka_consumer.py
    # depends_on:
     # - kafka
     # - telecom-ai-agent
    

  redis:
    image: redis
    container_name: telecom-redis
    ports:
      - "6379:6379"

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: telecom-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: telecom-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: telecom-zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      